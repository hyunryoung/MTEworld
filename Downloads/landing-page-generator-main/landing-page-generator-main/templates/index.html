<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 상세페이지 생성기</title>
    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text: #1F2937;
            --border: #E5E7EB;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
        }

        .file-upload {
            border: 2px dashed var(--border);
            padding: 2rem;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .file-upload:hover {
            border-color: var(--primary);
        }

        #imagePreview {
            max-width: 100%;
            max-height: 200px;
            margin-top: 1rem;
            display: none;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }
        
        button:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        /* Progress Area */
        #progressContainer {
            display: none;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .progress-bar-bg {
            background-color: var(--border);
            height: 1rem;
            border-radius: 9999px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-bar-fill {
            background-color: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .status-text {
            text-align: center;
            font-weight: 500;
            color: var(--text);
        }

        /* Result Area */
        #resultContainer {
            display: none;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .download-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
            margin-bottom: 2rem;
        }

        .btn-secondary {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: var(--surface);
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background-color: var(--primary);
            color: white;
        }
        
        .preview-img {
            max-width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .section-item img {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .section-item p {
            font-size: 0.8rem;
            margin-top: 0.5rem;
            color: #6B7280;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI 상세페이지 생성기</h1>
    
    <form id="generateForm">
        <div class="form-group">
            <label for="product_name">제품명 *</label>
            <input type="text" id="product_name" name="product_name" required placeholder="예: Oyster 프리미엄 유모차">
        </div>
        
        <div class="form-group">
            <label>제품 사진 * (이 이미지를 기반으로 13개 섹션이 생성됩니다)</label>
            <div class="file-upload" onclick="document.getElementById('reference_image').click()">
                <p>클릭하여 이미지 업로드 (PNG, JPG, WEBP)</p>
                <input type="file" id="reference_image" name="reference_image" accept="image/*" style="display: none;" required onchange="previewImage(this)">
                <img id="imagePreview" alt="미리보기">
            </div>
        </div>
        
        <div class="form-group">
            <label for="features">제품 특징 (선택사항)</label>
            <textarea id="features" name="features" rows="4" placeholder="제품의 주요 특징이나 강조하고 싶은 점을 자유롭게 적어주세요. 공란으로 두면 AI가 알아서 생성합니다.&#10;예:&#10;- 한 손 폴딩&#10;- 올터레인 서스펜션"></textarea>
        </div>
        
        <button type="submit" id="submitBtn">상세페이지 생성하기 (약 7~10분 소요)</button>
    </form>

    <div id="progressContainer">
        <h3 style="text-align: center; margin-bottom: 1rem;">생성 진행 중...</h3>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <p class="status-text" id="statusText">초기화 중...</p>
    </div>

    <div id="resultContainer">
        <h2 style="color: #10B981;">🎉 생성 완료!</h2>
        
        <div class="download-links">
            <a id="downloadPng" href="#" class="btn-secondary" target="_blank" download>최종 PNG 다운로드</a>
            <a id="downloadPdf" href="#" class="btn-secondary" target="_blank" download>최종 PDF 다운로드</a>
        </div>
        
        <h3>미리보기</h3>
        <img id="finalPreview" class="preview-img" src="" alt="최종 상세페이지 미리보기">
        
        <h3 style="margin-top: 3rem;">섹션별 이미지</h3>
        <div class="sections-grid" id="sectionsGrid">
            <!-- Sections will be injected here -->
        </div>
    </div>
</div>

<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('imagePreview');
                img.src = e.target.result;
                img.style.display = 'inline-block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    document.getElementById('generateForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const form = e.target;
        const formData = new FormData(form);
        const submitBtn = document.getElementById('submitBtn');
        const progressContainer = document.getElementById('progressContainer');
        const resultContainer = document.getElementById('resultContainer');
        
        // UI 리셋
        submitBtn.disabled = true;
        submitBtn.innerText = "생성 중...";
        resultContainer.style.display = 'none';
        progressContainer.style.display = 'block';
        updateProgress(0, 13, "서버로 전송 중...");

        try {
            const response = await fetch('/generate', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            if (!response.ok) {
                throw new Error(data.error || '요청 실패');
            }
            
            // Polling 시작
            pollStatus(data.job_id);
            
        } catch (error) {
            alert('오류 발생: ' + error.message);
            resetForm();
        }
    });

    function updateProgress(current, total, text) {
        const percentage = total > 0 ? Math.round((current / total) * 100) : 0;
        document.getElementById('progressBar').style.width = percentage + '%';
        document.getElementById('statusText').innerText = text;
    }

    function resetForm() {
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = false;
        submitBtn.innerText = "상세페이지 생성하기 (약 7~10분 소요)";
        document.getElementById('progressContainer').style.display = 'none';
    }

    async function pollStatus(jobId) {
        try {
            const response = await fetch(`/status/${jobId}`);
            const data = await response.json();
            
            if (data.status === 'failed') {
                alert('생성 중 오류가 발생했습니다: ' + data.error);
                resetForm();
                return;
            }
            
            if (data.status === 'completed') {
                updateProgress(13, 13, "완료!");
                showResults(jobId);
                return;
            }
            
            if (data.status === 'planning') {
                updateProgress(5, 100, data.section); // 가짜 진행률 (5%)
            } else if (data.status === 'generating') {
                updateProgress(data.current, data.total, `섹션 생성 중 (${data.current}/${data.total}): ${data.section}`);
            } else {
                updateProgress(0, 100, "준비 중...");
            }
            
            // 계속 polling
            setTimeout(() => pollStatus(jobId), 2000);
            
        } catch (error) {
            console.error('Polling error:', error);
            // 일시적 네트워크 오류일 수 있으므로 계속 시도
            setTimeout(() => pollStatus(jobId), 2000);
        }
    }

    function showResults(jobId) {
        document.getElementById('progressContainer').style.display = 'none';
        
        const resultContainer = document.getElementById('resultContainer');
        const downloadPng = document.getElementById('downloadPng');
        const downloadPdf = document.getElementById('downloadPdf');
        const finalPreview = document.getElementById('finalPreview');
        const sectionsGrid = document.getElementById('sectionsGrid');
        
        // 링크 설정
        downloadPng.href = `/output/${jobId}/final_page.png`;
        downloadPdf.href = `/output/${jobId}/final_page.pdf`;
        
        // 미리보기 (브라우저 캐시 방지를 위해 쿼리스트링 추가)
        finalPreview.src = `/output/${jobId}/preview.png?t=${new Date().getTime()}`;
        
        // 섹션 그리드 렌더링
        const sections = [
            "01_hero.png", "02_pain.png", "03_problem.png", "04_story.png",
            "05_solution.png", "06_how_it_works.png", "07_social_proof.png",
            "08_authority.png", "09_benefits.png", "10_risk_removal.png",
            "11_comparison.png", "12_target_filter.png", "13_final_cta.png"
        ];
        
        sectionsGrid.innerHTML = '';
        sections.forEach(sec => {
            const div = document.createElement('div');
            div.className = 'section-item';
            div.innerHTML = `
                <a href="/output/${jobId}/sections/${sec}" target="_blank">
                    <img src="/output/${jobId}/sections/${sec}?t=${new Date().getTime()}" alt="${sec}" onerror="this.parentElement.parentElement.style.display='none'">
                </a>
                <p>${sec.replace('.png', '')}</p>
            `;
            sectionsGrid.appendChild(div);
        });
        
        resultContainer.style.display = 'block';
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = false;
        submitBtn.innerText = "새로운 상세페이지 만들기";
    }
</script>

</body>
</html>
